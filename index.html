<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>卫星仿真 - Satellite Sim</title>
  </head>
  <body>
    <div id="app">
      <div id="cesiumContainer"></div>
      <div id="loadingOverlay" class="loading-overlay">正在加载地球…</div>

      <div id="hud">
        <section class="hud-panel hud-panel-first">
          <h2>仿真设置</h2>
          <div class="settings-form">
            <label class="settings-field">
              <span>轨道高度 (km)</span>
              <input type="number" id="altitudeInput" class="settings-input" />
            </label>
            <label class="settings-field">
              <span>传感器视场 (km)</span>
              <input type="number" id="swathInput" class="settings-input" />
            </label>
            <label class="settings-toggle">
              <input type="checkbox" id="hideAfterCycleToggle" checked />
              <span>30 天后隐藏痕迹</span>
            </label>
            <button type="button" id="btnApplySettings" class="settings-apply">
              应用并重置仿真
            </button>
            <p class="param-note">双星相位差 180°；应用后将清空条带并从第 0 天重算。</p>
          </div>
        </section>
        <section class="hud-panel">
          <h2>卫星参数</h2>
          <dl id="paramDisplay"></dl>
        </section>
      </div>

      <div id="timeBar" class="wf-controls-float">
        <div class="wf-left-col">
            <div class="wf-watch-face">
              <div class="wf-watch-ring"></div>
              <div class="wf-watch-inner">
                <div id="watchBadge" class="wf-watch-badge">LOCAL</div>
                <div id="watchTime" class="wf-watch-time">00:00:00</div>
                <div id="watchDate" class="wf-watch-date">JAN 01 2024</div>
              </div>
            </div>
            <div class="wf-controls">
              <button type="button" id="btnLive" class="wf-btn wf-btn-live active">
                <span class="wf-live-dot"></span>LIVE
              </button>
              <button type="button" id="btnPlay" class="wf-btn wf-btn-icon" aria-label="播放">
                <svg class="wf-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
              </button>
              <button type="button" id="btnSpeed1" class="wf-btn wf-btn-icon" title="倍速1 (600×)">
                <svg class="wf-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M4 18l8.5-6L4 6v12zm9-12v12l8.5-6L13 6z"/></svg>
              </button>
              <button type="button" id="btnSpeed2" class="wf-btn wf-btn-icon" title="倍速2 (1000×)">
                <svg class="wf-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M4 18l8.5-6L4 6v12zm9 0l8.5-6-8.5-6v12zm9 0l8.5-6-8.5-6v12z"/></svg>
              </button>
            </div>
            <div class="wf-jump-row" title="离线快进到指定仿真天数，完成后可继续倍速播放">
              <span class="wf-jump-label">跳转</span>
              <button type="button" class="wf-btn wf-btn-jump" data-jump-days="5">5天</button>
              <button type="button" class="wf-btn wf-btn-jump" data-jump-days="10">10天</button>
              <button type="button" class="wf-btn wf-btn-jump" data-jump-days="15">15天</button>
              <button type="button" class="wf-btn wf-btn-jump" data-jump-days="30">30天</button>
              <button type="button" class="wf-btn wf-btn-jump" data-jump-days="60">60天</button>
              <input
                type="number"
                id="jumpDaysInput"
                class="wf-jump-input"
                min="0"
                max="400"
                step="1"
                placeholder="天数"
                aria-label="自定义跳转天数"
              />
              <button type="button" id="btnJumpGo" class="wf-btn wf-btn-jump-go">前往</button>
            </div>
          </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
